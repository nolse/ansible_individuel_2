[defaults]
# Fichier d'inventaire à utiliser (liste des hôtes client1, client2)
inventory = hosts

# Ne pas vérifier l'empreinte SSH des hôtes (évite le prompt "Are you sure?" à la 1ère connexion)
host_key_checking = False

# Texte injecté automatiquement en en-tête des fichiers gérés par Ansible (templates)
ansible_managed = Managed by Ansible - file:{file} - host:{host} - uid:{uid}

# Masque les warnings "cette feature sera dépréciée dans une future version"
deprecation_warnings = False

# Fichier contenant le mot de passe Vault → Ansible déchiffre group_vars/all.yml automatiquement
# sans demander le mot de passe à chaque commande
vault_password_file = ~/.vault_pass

[ssh_connection]
# ControlMaster=auto   → réutilise une connexion SSH déjà ouverte plutôt d'en créer une nouvelle
#                        à chaque tâche Ansible (gain de temps significatif sur les gros playbooks)
# ControlPersist=60s   → garde la connexion SSH "en veille" 60 secondes après la dernière tâche
#                        pour la réutiliser si une nouvelle commande arrive rapidement
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
